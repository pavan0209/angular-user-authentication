<div class="confirm-dialog">
  <div class="confirm-dialog__icon">
    <mat-icon> warning </mat-icon>
  </div>

  <h2 class="confirm-dialog__title">
    {{ data.title }}
  </h2>

  <p class="confirm-dialog__message">
    {{ data.message }}
  </p>

  <div class="confirm-dialog__actions">
    <app-button
      [text]="data.cancelButtonText"
      variant="secondary"
      [fullWidth]="false"
      (buttonClick)="cancel()"
    >
    </app-button>

    <app-button
      [text]="data.confirmButtonText"
      variant="danger"
      [fullWidth]="false"
      (buttonClick)="confirm()"
    >
    </app-button>
  </div>
</div>
