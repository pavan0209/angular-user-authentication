<button
  mat-flat-button
  [type]="type()"
  [disabled]="disabled() || loading()"
  (click)="onClick()"
  [class.button--full]="fullWidth()"
  [class.button--primary]="variant() === 'primary'"
  [class.button--secondary]="variant() === 'secondary'"
  [class.button--danger]="variant() === 'danger'"
>
  @if (loading()) {
    Loading...
  } @else {
    {{ text() }}
  }
</button>
